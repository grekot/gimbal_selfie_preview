name: Android CI

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # potrzebne do utworzenia Release przy tagu v*

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Compute version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "name=0.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "Keystore restored ($(wc -c < "$RUNNER_TEMP/release.keystore") bytes)."
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "::error::Release build on tag but KEYSTORE_BASE64 secret is missing — add it in Settings → Secrets → Actions."
            exit 1
          else
            echo "::warning::No KEYSTORE_BASE64 secret — building with Gradle's auto debug key (APK won't OTA-update over release installs)."
          fi

      - name: Build debug APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew assembleDebug -PappVersion=${{ steps.ver.outputs.name }} -PappVersionCode=${{ github.run_number }} --stacktrace

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release (only on v* tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
